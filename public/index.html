<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction Feed</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Transaction Feed</h1>
    </header>

    <section class="summary" id="summary">
      <div class="summary-card">
        <span class="label">Total Credits</span>
        <span class="value" id="total-credits">—</span>
      </div>
      <div class="summary-card">
        <span class="label">Total Debits</span>
        <span class="value" id="total-debits">—</span>
      </div>
      <div class="summary-card">
        <span class="label">Pending</span>
        <span class="value" id="count-pending">—</span>
      </div>
      <div class="summary-card">
        <span class="label">Completed</span>
        <span class="value" id="count-completed">—</span>
      </div>
      <div class="summary-card">
        <span class="label">Failed</span>
        <span class="value" id="count-failed">—</span>
      </div>
    </section>

    <section class="filters">
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
        <option value="failed">Failed</option>
      </select>
      <select id="filter-type">
        <option value="">All types</option>
        <option value="debit">Debit</option>
        <option value="credit">Credit</option>
      </select>
    </section>

    <section class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Description</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Currency</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="transactions-body">
          <tr><td colspan="6" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </section>

    <nav class="pagination" id="pagination"></nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
